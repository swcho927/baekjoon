<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그뭐냐 Judge</title>

    <!-- 구글 폰트: 코딩 느낌의 JetBrains Mono + 한글용 Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- 스타일시트 -->
    <link rel="stylesheet" href="style.css">

    <!--
        ★★★ 핵심: Skulpt 로드 (Pyodide 대체)
        ────────────────────────────────────────
        Pyodide를 버린 이유:
          - 30MB 이상 다운로드 필요 → 로딩 매우 느림
          - Web Worker 내부에서 CDN 재로드 → 환경에 따라 막힘

        Skulpt를 쓰는 이유:
          - 파일 2개, 수백KB → 즉시 로드
          - <script> 태그로 로드하면 Sk 전역 객체 바로 사용 가능
          - 나중에 친구분 JS 컴파일러로 교체 시 judge.js의
            runCode() 함수 안만 수정하면 됩니다.

        skulpt.min.js     → Skulpt 핵심 엔진
        skulpt-stdlib.js  → Python 표준 라이브러리 (sys, io 등)
    -->
    <script src="https://skulpt.org/js/skulpt.min.js"></script>
    <script src="https://skulpt.org/js/skulpt-stdlib.js"></script>

    <!-- Monaco 에디터 로더 (VS Code와 동일한 코드 에디터) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

    <!-- 문제 데이터: problems 폴더에서 관리 -->
    <!-- 새 문제 추가 시 여기에 <script src="problems/번호.js"> 추가 -->
    <script src="problems/1000.js"></script>
</head>
<body>

<!-- ════════════════════════════════════════════════════
     네비게이션 바
     ════════════════════════════════════════════════════ -->
<nav class="navbar">
    <a class="navbar-brand" href="#">그뭐냐 JUDGE</a>
    <span class="navbar-sub">/ 1000번</span>

    <!-- 엔진 로딩 상태: 로딩중(깜박)→준비완료(초록)→에러(빨강) -->
    <div class="engine-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">엔진 초기화 중...</span>
    </div>
</nav>


<!-- ════════════════════════════════════════════════════
     메인 컨텐츠
     ════════════════════════════════════════════════════ -->
<div class="main">

    <!-- 문제 번호 + 제목 -->
    <div class="problem-header">
        <div class="problem-num" id="prob-num">PROBLEM #1000</div>
        <div class="problem-title" id="prob-title">A+B</div>
    </div>

    <!-- 시간/메모리 제한 정보 -->
    <div class="info-table">
        <div class="info-cell">
            <div class="label">시간 제한</div>
            <div class="value" id="info-time">—</div>
        </div>
        <div class="info-cell">
            <div class="label">메모리 제한</div>
            <div class="value" id="info-mem">—</div>
        </div>
        <div class="info-cell">
            <div class="label">테스트케이스</div>
            <div class="value" id="info-tc">—</div>
        </div>
    </div>

    <!-- 문제 설명 -->
    <div class="section-title">문제</div>
    <div class="content-box" id="prob-desc">로딩 중...</div>

    <!-- 입력 형식 -->
    <div class="section-title">입력</div>
    <div class="content-box" id="prob-input">로딩 중...</div>

    <!-- 출력 형식 -->
    <div class="section-title">출력</div>
    <div class="content-box" id="prob-output">로딩 중...</div>

    <!-- 예제 테스트케이스 (JS에서 동적으로 생성) -->
    <div class="section-title">예제</div>
    <div id="examples-container"></div>


    <!-- ════════════════════════════════════════════════
         제출 섹션
         ════════════════════════════════════════════════ -->
    <div class="submit-section">
        <div class="submit-title">// 코드 제출</div>

        <!-- Monaco 에디터가 이 div 안에 생성됩니다 -->
        <div id="editor-container"></div>

        <!--
            제출 버튼
            - 처음엔 disabled (엔진 로딩 완료 전)
            - 엔진 준비 완료 시 judge.js의 initEngine()이 활성화
        -->
        <button id="submit-btn" onclick="startJudge()" disabled>
            엔진 초기화 중...
        </button>

        <!-- ── 채점 진행 영역 (채점 시작 전엔 숨김) ── -->
        <div id="progress-section">
            <!-- 진행 상태 텍스트 + 퍼센트 -->
            <div class="progress-label">
                <span id="progress-text">채점 준비 중...</span>
                <span id="progress-pct">0%</span>
            </div>
            <!-- 진행 바 -->
            <div class="progress-bar-wrap">
                <div id="progress-bar"></div>
            </div>
            <!-- 테스트케이스별 결과 목록 (JS에서 동적 생성) -->
            <div id="tc-results"></div>
        </div>

        <!-- 최종 결과 (맞았습니다!! / 틀렸습니다) -->
        <div class="final-result" id="final-result"></div>

        <!-- 에러/오답 상세 로그 -->
        <div id="error-log"></div>
    </div>

</div><!-- /.main -->


<!-- ════════════════════════════════════════════════════
     채점 로직 로드
     ════════════════════════════════════════════════════ -->
<script src="judge.js"></script>

<script>
    // ── 페이지 로드 완료 시 초기화 ──────────────────────
    // DOMContentLoaded: HTML 파싱 완료 후 실행
    document.addEventListener('DOMContentLoaded', function () {

        // 1. problems/1000.js에서 정의된 PROBLEM_1000 데이터로 UI 채우기
        loadProblemUI(PROBLEM_1000);

        // 2. Monaco 에디터 + Skulpt 엔진 초기화 (judge.js의 함수)
        initEditor(PROBLEM_1000.starterCode);
    });


    // 문제 데이터를 받아서 화면에 표시하는 함수
    function loadProblemUI(prob) {
        // 제목/번호
        document.getElementById('prob-num').textContent   = 'PROBLEM #' + prob.id;
        document.getElementById('prob-title').textContent = prob.title;

        // 제한 정보
        document.getElementById('info-time').textContent = prob.timeLimit + '초';
        document.getElementById('info-mem').textContent  = prob.memoryLimit + 'MB';
        document.getElementById('info-tc').textContent   = prob.testCases.length + '개';

        // 문제 본문 (innerHTML: HTML 태그 허용)
        document.getElementById('prob-desc').innerHTML   = prob.description;
        document.getElementById('prob-input').innerHTML  = prob.inputDesc;
        document.getElementById('prob-output').innerHTML = prob.outputDesc;

        // 예제 테스트케이스 동적 생성
        const container = document.getElementById('examples-container');
        prob.examples.forEach(function (ex, idx) {
            var grid = document.createElement('div');
            grid.className = 'tc-grid';
            grid.style.marginBottom = '12px';
            grid.innerHTML =
                '<div class="tc-box">' +
                    '<div class="tc-box-header">예제 입력 ' + (idx + 1) + '</div>' +
                    '<div class="tc-box-content">' + ex.input + '</div>' +
                '</div>' +
                '<div class="tc-box">' +
                    '<div class="tc-box-header">예제 출력 ' + (idx + 1) + '</div>' +
                    '<div class="tc-box-content">' + ex.output + '</div>' +
                '</div>';
            container.appendChild(grid);
        });
    }
</script>

</body>
</html>
