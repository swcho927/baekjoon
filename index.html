<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DevJudge Pro | Local Edition (Test Case Upgrade)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --border: #30363d; --accent: #58a6ff; }
        body { background: var(--bg); color: #c9d1d9; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        .main { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .prob-item { cursor: pointer; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid transparent; background: #21262d; }
        .prob-item.active { background: #1f6feb33; border-color: #1f6feb; color: var(--accent); }
        #editor { height: 400px; border: 1px solid var(--border); border-radius: 8px; margin: 20px 0; }
        .verdict { font-size: 1.2rem; font-weight: bold; text-align: center; margin-top: 15px; white-space: pre-wrap; line-height: 1.5; }
        pre { background: #010409; color: #7ee787; padding: 15px; border-radius: 8px; border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
        .progress { height: 12px; background: #30363d; margin: 20px 0; display: none; border-radius: 10px; }
        .limit-tag { font-size: 0.85rem; color: #58a6ff; border: 1px solid rgba(88,166,255,0.3); padding: 4px 10px; border-radius: 20px; background: rgba(88,166,255,0.1); }
        .tc-badges { font-size: 0.8rem; margin-top: 5px; }
        .tc-badge-public { color: #3fb950; border: 1px solid #3fb950; padding: 2px 6px; border-radius: 10px; margin-right: 4px; }
        .tc-badge-hidden { color: #d29922; border: 1px solid #d29922; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center bg-dark">
    <h4 class="m-0 fw-bold text-primary">DevJudge <span class="text-white">Local App</span></h4>
    <div id="status" class="text-warning fw-bold">파이썬 엔진 로딩 중... (최초 1회)</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div id="probList"></div>
    </div>
    <div class="main">
        <div id="probContent" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 id="vTitle" class="fw-bold text-white m-0"></h2>
                <div>
                    <span class="limit-tag">Time: 1.0s</span>
                    <span class="limit-tag">Memory: 256MB</span>
                </div>
            </div>
            
            <p id="vDesc" style="white-space: pre-wrap; line-height: 1.6;"></p>
            
            <div class="bg-dark p-3 rounded mb-3 border border-secondary">
                <h6 class="fw-bold text-light">테스트 케이스 구성</h6>
                <div id="tcSummary" class="tc-badges"></div>
            </div>

            <div id="editor"></div>
            <div class="progress"><div id="pBar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary"></div></div>
            <div id="vResult" class="verdict"></div>
            
            <button id="sBtn" class="btn btn-primary btn-lg w-100 py-3 mt-4 fw-bold" onclick="runLocalJudge()" disabled>엔진 로딩 중...</button>
        </div>
    </div>
</div>

<script>
    let editor, activeIdx = -1;
    let pyodideReady = false;
    let pyodide;
    
    // 🔥 테스트 케이스를 엣지/히든 개념을 도입해 강화했어
    const probs = [
        { 
            title: "A + B (Test Case Upgrade)", 
            desc: "두 정수의 합을 출력하세요.\n단, 입력값에는 음수나 0이 포함될 수도 있습니다.", 
            cases: [
                // 1. 일반 케이스 (공개)
                {in: "1 2", out: "3", hidden: false},
                // 2. 엣지 케이스 (0이나 음수 포함 - 공개)
                {in: "0 0", out: "0", hidden: false},
                {in: "-5 10", out: "5", hidden: false},
                // 3. 히든 케이스 (사용자에게 기댓값을 숨김)
                {in: "100 200", out: "300", hidden: true},
                {in: "9999 -9999", out: "0", hidden: true}
            ]
        }
    ];

    async function initEngine() {
        try {
            pyodide = await loadPyodide();
            pyodideReady = true;
            document.getElementById('status').innerText = "⚡ 로컬 파이썬 엔진 준비 완료";
            document.getElementById('status').className = "text-success fw-bold";
            if(document.getElementById('sBtn')) {
                document.getElementById('sBtn').innerText = "로컬 즉시 채점 시작";
                document.getElementById('sBtn').disabled = false;
            }
        } catch(e) {
            document.getElementById('status').innerText = "엔진 로딩 실패";
            document.getElementById('status').className = "text-danger fw-bold";
        }
    }
    initEngine();

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor'), {
            value: "a, b = map(int, input().split())\nprint(a + b)", language: 'python', theme: 'vs-dark', automaticLayout: true, fontSize: 15
        });
        renderList();
    });

    function renderList() {
        document.getElementById('probList').innerHTML = probs.map((p, i) => 
            `<div class="prob-item ${activeIdx===i?'active':''}" onclick="loadProb(${i})">
                <div class="fw-bold">${p.title}</div>
                <small class="text-info">총 ${p.cases.length}개 케이스</small>
            </div>`
        ).join('');
        loadProb(0);
    }

    function loadProb(i) {
        activeIdx = i;
        const p = probs[i];
        document.getElementById('probContent').style.display = 'block';
        document.getElementById('vTitle').innerText = p.title;
        document.getElementById('vDesc').innerText = p.desc;
        document.getElementById('vResult').innerText = "";
        
        // 공개/히든 케이스 개수 요약 보여주기
        const publicCnt = p.cases.filter(c => !c.hidden).length;
        const hiddenCnt = p.cases.filter(c => c.hidden).length;
        document.getElementById('tcSummary').innerHTML = `
            <span class="tc-badge-public">공개 케이스: ${publicCnt}개</span>
            <span class="tc-badge-hidden">히든 케이스: ${hiddenCnt}개</span>
        `;
    }

    async function runLocalJudge() {
        if (!pyodideReady) {
            alert("파이썬 엔진이 아직 로딩 중입니다.");
            return;
        }

        const userCode = editor.getValue();
        const p = probs[activeIdx];
        const bar = document.getElementById('pBar');
        const res = document.getElementById('vResult');
        const btn = document.getElementById('sBtn');
        
        document.querySelector('.progress').style.display = 'block';
        bar.style.width = '0%';
        res.innerText = "채점 중...";
        res.className = "verdict text-warning";
        btn.disabled = true;

        for (let i = 0; i < p.cases.length; i++) {
            const c = p.cases[i];
            
            try {
                res.innerText = `케이스 #${i+1} : 채점 중...`;
                
                pyodide.globals.set("user_code", userCode);
                pyodide.globals.set("input_data", c.in);
                
                const wrapper = `
import sys
import io
import traceback

sys.stdin = io.StringIO(input_data)
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()

try:
    exec(user_code, {'__name__': '__main__'})
except Exception:
    traceback.print_exc(file=sys.stderr)

[sys.stdout.getvalue(), sys.stderr.getvalue()]
`;
                const resultList = await pyodide.runPythonAsync(wrapper);
                const actualOut = resultList.toJs()[0].trim();
                let actualErr = resultList.toJs()[1].trim();
                resultList.destroy();

                if (actualErr) {
                    res.innerText = `💥 런타임 에러 - 케이스 #${i+1}\n\n${actualErr}`;
                    res.className = "verdict text-danger";
                    btn.disabled = false; return;
                }

                if (actualOut === c.out.trim()) {
                    let pct = Math.floor(((i + 1) / p.cases.length) * 100);
                    bar.style.width = pct + '%';
                } else {
                    // 🔥 히든 케이스 여부에 따라 에러 메시지 다르게 출력
                    let errorMsg = `❌ 틀렸습니다 - 케이스 #${i+1}`;
                    if (c.hidden) {
                        errorMsg += `\n\n(히든 테스트 케이스에서 실패했습니다. 코드를 다시 점검해보세요!)`;
                    } else {
                        errorMsg += `\n\n입력값:\n${c.in}\n\n기대값:\n${c.out}\n\n내 출력:\n${actualOut}`;
                    }
                    
                    res.innerText = errorMsg;
                    res.className = "verdict text-danger";
                    btn.disabled = false; return;
                }

                await new Promise(r => setTimeout(r, 200));

            } catch (e) {
                res.innerText = "⚠️ 문법 에러 발생: \n" + e.message;
                res.className = "verdict text-danger";
                btn.disabled = false; return;
            }
        }
        res.innerText = "✨ 모든 테스트 케이스를 통과했습니다! 🎉";
        res.className = "verdict text-success fs-1 mt-4";
        btn.disabled = false;
    }
</script>
</body>
</html>
