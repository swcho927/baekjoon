<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Judge Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar { height: 100vh; border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; overflow-y: auto; }
        .main-view { height: 100vh; overflow-y: auto; padding: 40px; }
        
        /* UI Components */
        .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .editor-container { background: #000; border-radius: 12px; padding: 15px; border: 1px solid #334155; }
        textarea { width: 100%; height: 300px; background: transparent; color: #38bdf8; border: none; outline: none; font-family: 'JetBrains Mono', monospace; font-size: 14px; resize: none; }
        
        .prob-link { cursor: pointer; padding: 12px; border-radius: 8px; transition: 0.2s; color: #94a3b8; display: block; text-decoration: none; margin-bottom: 5px; }
        .prob-link:hover, .prob-link.active { background: rgba(56, 189, 248, 0.1); color: var(--accent); font-weight: 600; }
        
        .status-tag { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; background: #334155; }
        pre { background: #0f172a; padding: 15px; border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; }
        
        /* Result Animation */
        .res-item { padding: 10px; border-radius: 6px; margin-bottom: 5px; font-size: 0.9rem; }
        .res-correct { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #4ade80; }
        .res-wrong { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #f87171; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0 text-info">BJ Clone</h4>
                <button class="btn btn-sm btn-outline-info" data-bs-toggle="modal" data-bs-target="#addModal"><i class="bi bi-plus-lg"></i> 문제추가</button>
            </div>
            <div id="probList"></div>
            <hr class="opacity-10">
            <div id="engineStatus" class="text-muted small text-center">파이썬 엔진 준비 중...</div>
        </div>

        <div class="col-md-9 main-view">
            <div id="emptyView" class="text-center py-5">
                <h1 class="display-5 fw-bold text-secondary opacity-25 mt-5">Select a Problem</h1>
            </div>

            <div id="probView" style="display: none;">
                <h1 id="vTitle" class="fw-bold"></h1>
                <div class="d-flex gap-2 my-3">
                    <span class="status-tag">시간 제한: 2초</span>
                    <span class="status-tag">메모리 제한: 128MB</span>
                </div>
                
                <div class="glass-card mt-4">
                    <h5><i class="bi bi-info-circle me-2"></i>문제 설명</h5>
                    <p id="vDesc" class="text-muted lh-lg"></p>
                    <div class="row mt-4">
                        <div class="col-6">
                            <h6>입력 조건</h6>
                            <p id="vInputSpec" class="small text-muted"></p>
                        </div>
                        <div class="col-6">
                            <h6>출력 조건</h6>
                            <p id="vOutputSpec" class="small text-muted"></p>
                        </div>
                    </div>
                </div>

                <div class="editor-container mt-4">
                    <textarea id="codeEditor" spellcheck="false" placeholder="소스 코드를 입력하세요..."></textarea>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button id="submitBtn" class="btn btn-primary btn-lg flex-grow-1 fw-bold" disabled>제출하기</button>
                    <button onclick="resetCode()" class="btn btn-secondary btn-lg"><i class="bi bi-arrow-counterclockwise"></i></button>
                </div>

                <div id="resultArea" class="mt-4 glass-card d-none">
                    <h5 class="mb-3">채점 결과</h5>
                    <div id="testcaseResults"></div>
                    <h3 id="finalVerdict" class="text-center mt-3 fw-bold"></h3>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">새 문제 및 테스트케이스 추가</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <div class="col-12"><label class="form-label">문제 제목</label><input type="text" id="inTitle" class="form-control bg-secondary text-white border-0"></div>
                    <div class="col-12"><label class="form-label">문제 설명</label><textarea id="inDesc" class="form-control bg-secondary text-white border-0"></textarea></div>
                    <div class="col-md-6"><label class="form-label">입력 조건</label><input type="text" id="inInSpec" class="form-control bg-secondary text-white border-0"></div>
                    <div class="col-md-6"><label class="form-label">출력 조건</label><input type="text" id="inOutSpec" class="form-control bg-secondary text-white border-0"></div>
                    <div class="col-12">
                        <label class="form-label">테스트케이스 (형식: 입력|출력, 여러개는 줄바꿈)</label>
                        <textarea id="inCases" placeholder="1 2|3&#10;5 5|10" class="form-control bg-secondary text-white border-0" style="height: 100px;"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button onclick="saveProblem()" class="btn btn-info w-100 fw-bold">시스템에 등록</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let pyodide = null;
    let problems = JSON.parse(localStorage.getItem('boj_data')) || [
        {
            title: "A + B",
            desc: "두 정수 A와 B를 입력받은 다음, A+B를 출력하는 프로그램을 작성하시오.",
            inSpec: "첫째 줄에 A와 B가 주어진다. (0 < A, B < 10)",
            outSpec: "첫째 줄에 A+B를 출력한다.",
            cases: [{in: "1 2", out: "3"}, {in: "10 20", out: "30"}, {in: "0 5", out: "5"}]
        }
    ];
    let activeIdx = -1;

    async function init() {
        pyodide = await loadPyodide();
        document.getElementById('engineStatus').innerText = "✅ 파이썬 엔진 준비 완료";
        document.getElementById('submitBtn').disabled = false;
        renderList();
    }
    init();

    function renderList() {
        const list = document.getElementById('probList');
        list.innerHTML = problems.map((p, i) => `
            <div class="prob-link ${activeIdx === i ? 'active' : ''}" onclick="loadProb(${i})">
                <small class="text-info opacity-50 d-block">Problem ${i+1}</small>
                ${p.title}
            </div>
        `).join('');
    }

    function loadProb(i) {
        activeIdx = i;
        const p = problems[i];
        document.getElementById('emptyView').style.display = 'none';
        document.getElementById('probView').style.display = 'block';
        document.getElementById('vTitle').innerText = p.title;
        document.getElementById('vDesc').innerText = p.desc;
        document.getElementById('vInputSpec').innerText = p.inSpec;
        document.getElementById('vOutputSpec').innerText = p.outSpec;
        document.getElementById('resultArea').classList.add('d-none');
        renderList();
    }

    function saveProblem() {
        const rawCases = document.getElementById('inCases').value.split('\n');
        const formattedCases = rawCases.map(line => {
            const [i, o] = line.split('|');
            return {in: i.trim(), out: o.trim()};
        });

        problems.push({
            title: document.getElementById('inTitle').value,
            desc: document.getElementById('inDesc').value,
            inSpec: document.getElementById('inInSpec').value,
            outSpec: document.getElementById('inOutSpec').value,
            cases: formattedCases
        });

        localStorage.setItem('boj_data', JSON.stringify(problems));
        renderList();
        bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
    }

    document.getElementById('submitBtn').onclick = async () => {
        const code = document.getElementById('codeEditor').value;
        const p = problems[activeIdx];
        const resList = document.getElementById('testcaseResults');
        const resArea = document.getElementById('resultArea');
        const verdict = document.getElementById('finalVerdict');

        resArea.classList.remove('d-none');
        resList.innerHTML = "";
        verdict.innerText = "채점 중...";
        verdict.className = "text-center mt-3 fw-bold text-warning";

        let allPassed = true;

        for (let i = 0; i < p.cases.length; i++) {
            const c = p.cases[i];
            const div = document.createElement('div');
            div.className = "res-item mb-2";
            div.innerHTML = `Case #${i+1}: 실행 중...`;
            resList.appendChild(div);

            try {
                pyodide.runPython(`
                    import io, sys
                    sys.stdin = io.StringIO("${c.in}")
                    sys.stdout = io.StringIO()
                `);
                await pyodide.runPythonAsync(code);
                const out = pyodide.runPython("sys.stdout.getvalue()").trim();

                if (out === c.out) {
                    div.className = "res-item res-correct";
                    div.innerHTML = `Case #${i+1}: 맞았습니다!`;
                } else {
                    div.className = "res-item res-wrong";
                    div.innerHTML = `Case #${i+1}: 틀렸습니다 (내 출력: ${out} / 정답: ${c.out})`;
                    allPassed = false;
                }
            } catch (e) {
                div.className = "res-item res-wrong";
                div.innerHTML = `Case #${i+1}: 에러 (${e.message.split('\n').pop()})`;
                allPassed = false;
            }
        }

        if (allPassed) {
            verdict.innerText = "맞았습니다!! 🎉";
            verdict.className = "text-center mt-3 fw-bold text-success";
        } else {
            verdict.innerText = "틀렸습니다";
            verdict.className = "text-center mt-3 fw-bold text-danger";
        }
    };

    function resetCode() {
        document.getElementById('codeEditor').value = "";
    }
</script>

</body>
</html>
