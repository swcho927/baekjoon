<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>그뭐냐 Judge</title>
    <link rel="stylesheet" href="style.css">

    <!--
        공통 전역 변수 및 유틸 함수를 가장 먼저 선언.
        problems/*.js 가 로드될 때 이미 존재해야 하므로 <head> 에 배치.
    -->
    <script>
        // 전체 문제 목록을 담는 전역 레지스트리
        window.PROBLEMS = {};
    </script>
</head>
<body>

<!-- ── 상단 바 ── -->
<div class="topbar">
    <span class="topbar-brand">그뭐냐 <span>Judge</span></span>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">그 뭐냐 언어 전용 채점 사이트</span>
</div>

<div class="layout">

    <!-- ── 왼쪽 사이드바: 문제 목록 ── -->
    <nav class="sidebar">
        <div class="sidebar-label">문제 목록</div>

        <!-- 문제가 추가될 때마다 여기에 항목을 추가 -->
        <a class="sidebar-item active" id="tab-aplusb" onclick="switchProblem('aplusb')">
            <span class="sidebar-num">1000</span>
            <span class="sidebar-title">A+B</span>
        </a>
    </nav>

    <!-- ── 오른쪽 메인 영역 ── -->
    <div class="main-content">

        <!-- ══ 1000번: A+B ══ -->
        <div class="prob-page active" id="page-aplusb">
        <div class="container">

            <div class="problem-header">
                <div class="problem-number">1000번</div>
                <h1 class="problem-title">A+B</h1>
            </div>

            <!-- 문제 정보 테이블 -->
            <table class="info-table">
                <thead>
                    <tr><th>시간 제한</th><th>메모리 제한</th><th>테스트 케이스</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2 초</td>
                        <td>256 MB</td>
                        <!-- generateTC() 가 실행되면 이 텍스트가 바뀜 -->
                        <td id="tcCountAplusb">생성 중...</td>
                    </tr>
                </tbody>
            </table>

            <div class="section-title">문제</div>
            <div class="content-box">
                두 정수 A와 B를 입력받은 다음, A+B를 출력하는 프로그램을 작성하시오.
            </div>

            <div class="section-title">입력</div>
            <div class="content-box">
                첫째 줄에 A와 B가 주어진다. (1 ≤ A, B ≤ 9)
            </div>

            <div class="section-title">출력</div>
            <div class="content-box">
                첫째 줄에 A+B를 출력한다.
            </div>

            <div class="section-title">예제</div>
            <div class="examples-grid">
                <div class="example-block">
                    <div class="example-header">입력 1</div>
                    <div class="example-content">1
2</div>
                </div>
                <div class="example-block">
                    <div class="example-header">출력 1</div>
                    <div class="example-content">3</div>
                </div>
            </div>

            <!-- ── 코드 제출 영역 ── -->
            <div class="submit-section">
                <div class="submit-header">
                    <span class="submit-title">코드 제출</span>
                    <span class="submit-lang">그 뭐냐 언어</span>
                </div>

                <!-- 코드 입력 textarea -->
                <textarea
                    id="editor-aplusb"
                    class="code-editor"
                    placeholder="여기에 그 뭐냐 코드를 작성하세요..."
                    spellcheck="false"
                ></textarea>

                <button
                    id="sBtn-aplusb"
                    class="btn-submit"
                    onclick="submitCode('aplusb')"
                >제출 및 채점 시작</button>

                <!-- 채점 진행 영역 -->
                <div class="judge-area">

                    <!-- 프로그레스 바 (채점 중에만 표시) -->
                    <div class="progress-wrap" id="progressWrap-aplusb">
                        <div class="progress-info">
                            <span>채점 중&nbsp;
                                <!-- "3 / 10" 형태로 현재 케이스 번호 표시 -->
                                <span id="progressNum-aplusb">0 / 0</span>
                            </span>
                            <!-- "30%" 형태로 퍼센트 표시 -->
                            <span id="progressText-aplusb">0%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="progressFill-aplusb"></div>
                        </div>
                    </div>

                    <!-- 최종 채점 결과 (맞았습니다 / 틀렸습니다 / 에러) -->
                    <div id="resultBox-aplusb" class="result-display"></div>

                    <!-- 오답일 때 어떤 케이스에서 틀렸는지 상세 정보 -->
                    <div id="errorLog-aplusb" class="error-log"></div>

                </div>
            </div>
        </div>
        </div>
        <!-- 문제 페이지 추가 시 여기 아래에 계속 추가 -->

    </div><!-- /main-content -->
</div><!-- /layout -->

<!--
    로드 순서가 매우 중요:
    1. problems/*.js  → 문제별 TC와 solver 를 PROBLEMS 에 등록
    2. judge.js       → PROBLEMS 를 읽어 채점 엔진 초기화
-->
<script src="problems/aplusb.js"></script>
<script src="judge.js"></script>

</body>
</html>
