<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DevJudge Pro - A+B Python</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
</head>
<body>

<nav class="navbar px-4">
    <span class="navbar-brand">DEVJUDGE <span style="color:white">PRO</span></span>
</nav>

<div class="container mt-5">
    <h2>A+B 문제</h2>
    <p class="text-muted">두 정수 A와 B를 입력받아 합을 출력하는 프로그램을 작성하세요.</p>
    
    <div id="editor-container" style="height: 350px; border: 1px solid #30363d; border-radius: 8px;"></div>
    
    <button id="sBtn" class="btn-submit w-100 mt-3" onclick="startJudging()" disabled>엔진 로딩 중...</button>
    
    <div id="resultBox" class="result-display"></div>
    <div id="errorLog" class="error-log" style="display:none;"></div>
</div>

<script src="./judge.js"></script>
<script>
    let editor;

    // 모나코 에디터 로드
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('editor-container'), {
            value: "import sys\n\na, b = map(int, sys.stdin.readline().split())\nprint(a + b)",
            language: 'python',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 16
        });
        // 엔진 초기화 (judge.js 내 함수)
        initPythonEngine();
    });

    async function startJudging() {
        const code = editor.getValue();
        runJudge(code);
    }
</script>
</body>
</html>
